name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify_release_notes:
    name: Verify release notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require release notes for tag
        run: |
          file="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$file" || { echo "Missing $file"; exit 1; }
          test -s "$file" || { echo "Empty $file"; exit 1; }

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: verify_release_notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.977

      - name: Generate templates
        run: templ generate

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          output="galleryduck${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "dist/${output}" cmd/api/main.go

      - name: Package
        run: |
          mkdir -p release
          tag="${GITHUB_REF_NAME}"
          base="galleryduck_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -C dist -czf "release/${base}.tar.gz" "galleryduck${{ matrix.ext }}"
            ./scripts/package_macos_app.sh "${{ matrix.goarch }}" "${tag}"
            mv "dist/macos-${{ matrix.goarch }}/${base}.tar.gz" "release/${base}_app.tar.gz"
          elif [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -q "../release/${base}.zip" "galleryduck${{ matrix.ext }}")
          else
            tar -C dist -czf "release/${base}.tar.gz" "galleryduck${{ matrix.ext }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs/releases

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          body_path: docs/releases/${{ github.ref_name }}.md
